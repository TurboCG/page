<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo Computing Group</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <img src="./res/branding.svg" alt="Turbo" class="header-logo">
    </div>
    <div class="content">
        <div class="banner">
            <img src="./res/ad1.png" alt="" class="imageBanner">
        </div>
        
        <div>
            <img src="res/matephoneBranding.svg" alt="" class="logo">
            <h1 class="productHeader">La familia Mate</h1>
            <div class="productDiv">
                <div class="product">
                    <img src="res/productspng/MATE1_product.png" alt="" class="productImg">
                    <h2 class="producttitle">Mate 1</h2>
                    <h4 class="productdesc">Rapido y ligero.</h4>
                    <button type="button" class="productButton" onclick="location.href='devices/mate1/index.html'">Ver mas</button>
                </div>
                <div class="product">
                    <img src="res/productspng/MATE1PRO_product.png" alt="" class="productImg">
                    <h2 class="producttitle">Mate 1 Pro</h2>
                    <h4 class="productdesc">Profesionalmente fabricado</h4>
                    <button type="button" class="productButton" onclick="location.href='devices/mate1pro/index.html'">Ver mas</button>
                </div>
                <div class="product">
                    <img src="res/productspng/MATE1LITE_product.png" alt="" class="productImg">
                    <h2 class="producttitle">Mate Lite</h2>
                    <h4 class="productdesc">Economico y divertido</h4>
                    <button type="button" class="productButton" onclick="location.href='devices/matelite/index.html'">Comprar</button>
                </div>
            </div>
        </div>
        <div class="productDiv">
            <div class="product">
                    <img src="res/productspng/MATEKETTLEPRO.png" alt="" class="productImg big" onclick="location.href='devices/matekettlepro/index.html'">
                </div>
            </div>
        <div>
            <img src="res/brandingKettle.svg" alt="" class="logo">
            <h1 class="productHeader">Pavas para mate y café.</h1>
            
        </div>
    </div>
</body>
</html>
